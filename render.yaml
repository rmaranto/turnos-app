services:
  - type: web
    name: turnos-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app import init_db; init_db()" && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DB_PATH
        value: /tmp/turnos.db
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+14155238886
